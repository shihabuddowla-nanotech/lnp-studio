<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LNP / Liposome Formulation Studio</title>
  <meta name="description" content="Online dashboard for liposome & lipid-nanoparticle formulation, stoichiometric calculation and characteristic prediction." />

  <!-- Icons / browser chrome (online-only web app — not an installable PWA) -->
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />

  <!-- Apply the saved theme before paint to avoid a flash of the wrong theme -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('lnp.theme');
        var dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.classList.toggle('dark', dark);
      } catch (e) { document.documentElement.classList.add('dark'); }
    })();
  </script>

  <!-- Vendored libraries (loaded fresh from the server each visit) -->
  <script src="vendor/tailwind.js"></script>
  <script>
    if (window.tailwind) {
      tailwind.config = {
        darkMode: 'class',
        theme: { extend: { fontFamily: { sans: ['Inter', 'Segoe UI', 'Roboto', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'] } } },
      };
    }
  </script>
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="vendor/htm.umd.js"></script>
  <script src="vendor/dexie.min.js"></script>
  <script src="vendor/xlsx.full.min.js"></script>

  <style>
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', 'Segoe UI', Roboto, ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      transition: background-color .25s ease, color .25s ease;
    }
    /* Light theme (default) */
    html:not(.dark) body {
      background-color: #f8fafc; /* slate-50 */
      background-image:
        radial-gradient(1100px 560px at 8% -12%, rgba(13,148,136,0.10), transparent 60%),
        radial-gradient(900px 560px at 100% 0%, rgba(99,102,241,0.08), transparent 55%);
      color: #1e293b; /* slate-800 */
    }
    /* Dark theme */
    html.dark body {
      background-color: #18181b; /* zinc-900 */
      background-image:
        radial-gradient(1200px 600px at 10% -10%, rgba(13,148,136,0.16), transparent 60%),
        radial-gradient(1000px 600px at 100% 0%, rgba(99,102,241,0.14), transparent 55%);
      color: #e4e4e7; /* zinc-200 */
    }
    .tabular-nums { font-variant-numeric: tabular-nums; }
    /* tidy scrollbars for the data-dense matrix */
    ::-webkit-scrollbar { height: 10px; width: 10px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    html.dark ::-webkit-scrollbar-thumb { background: #3f3f46; }
    ::-webkit-scrollbar-track { background: transparent; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#64748b;font-size:14px">
      Loading LNP Formulation Studio…
    </div>
  </div>
  <noscript style="display:block;padding:2rem;text-align:center">This application requires JavaScript.</noscript>

  <script type="module" src="src/main.js"></script>
</body>
</html>
